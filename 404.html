<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — NBSC GCO</title>
  <link rel="icon" href="assets/nbsc-logo.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d1b2e;color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:hidden}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none;animation:blobFloat 8s ease-in-out infinite alternate}
    .blob-1{width:500px;height:500px;background:#1a7a6e;top:-150px;left:-100px}
    .blob-2{width:400px;height:400px;background:#4ecdc4;bottom:-100px;right:-80px;animation-delay:3s}
    @keyframes blobFloat{from{transform:translate(0,0)}to{transform:translate(30px,20px)}}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:56px 48px;max-width:480px;width:100%;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.4)}
    .logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
    .logos img{height:40px;object-fit:contain;opacity:.85}
    .num{font-size:6rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#4ecdc4,#1a7a6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    h1{font-size:1.6rem;font-weight:800;margin-bottom:12px}
    p{font-size:.95rem;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:32px}
    .btn{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#1a7a6e,#0d5c52);color:white;padding:14px 32px;border-radius:12px;font-size:.95rem;font-weight:700;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(26,122,110,.4);width:100%;justify-content:center}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,122,110,.55)}
    .footer-note{margin-top:24px;font-size:.78rem;color:rgba(255,255,255,.3)}
    @media(max-width:480px){.card{padding:36px 24px}.num{font-size:4rem}}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="card">
    <div class="logos">
      <img src="assets/nbsc-logo.png" alt="NBSC" onerror="this.style.display='none'"/>
      <img src="assets/logo.png" alt="GCO" onerror="this.style.display='none'"/>
    </div>
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved.</p>
    <a href="index.html" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Go Back Home
    </a>
    <p class="footer-note">NBSC Guidance &amp; Counseling Office</p>
  </div>
</body>
</html>
